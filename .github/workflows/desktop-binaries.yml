name: Desktop binaries

# Builds the Electron desktop app for every platform and attaches the installers
# to the GitHub Release for the tag. It deliberately only ever *uploads assets* —
# the release itself and its hand-written notes belong to release.yml, which is
# careful never to overwrite them. Nothing here touches the release body.
#
# Run it by hand (workflow_dispatch) to check the build still works without
# cutting a tag; that path builds everything and uploads nothing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false # one platform failing shouldn't strand the others
      matrix:
        include:
          - os: ubuntu-22.04 # oldest supported glibc — newer runners break older distros
            bunTarget: bun-linux-x64
            builder: --linux AppImage deb
          - os: macos-14
            bunTarget: bun-darwin-arm64
            builder: --mac dmg --arm64
          - os: macos-14 # Intel mac cross-built from the arm64 runner
            bunTarget: bun-darwin-x64
            builder: --mac dmg --x64
          - os: windows-latest
            bunTarget: bun-windows-x64
            builder: --win nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build web
        run: cd web && bun run build

      # The server ships as a compiled sidecar, cross-built for the target. On
      # Windows it needs the .exe extension so the app can spawn it.
      - name: Compile server sidecar
        shell: bash
        run: |
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          mkdir -p electron/staging
          bun build --compile --target=${{ matrix.bunTarget }} server/src/index.ts \
            --outfile "electron/staging/agentglass-server${ext}"

      # Sync the package version to the tag so a v0.2.0 tag ships v0.2.0 files.
      - name: Sync version to the tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          node -e '
            const fs = require("fs")
            const f = "electron/package.json"
            const p = JSON.parse(fs.readFileSync(f, "utf8"))
            p.version = process.argv[1]
            fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n")
          ' "${GITHUB_REF_NAME#v}"

      # electron-builder packages the app; the web build and staged sidecar come
      # in via extraResources (see electron/package.json "build").
      - name: Package
        shell: bash
        working-directory: electron
        env:
          GH_TOKEN: ${{ github.token }}
        run: bunx electron-builder ${{ matrix.builder }} --publish never

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find electron/dist-app -maxdepth 1 -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) \
            -print0 | while IFS= read -r -d '' path; do
              echo "uploading $path"
              gh release upload "$GITHUB_REF_NAME" "$path" --clobber --repo "$GITHUB_REPOSITORY"
            done

      - name: Keep the build even when there is no tag
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: agentglass-${{ matrix.bunTarget }}
          path: |
            electron/dist-app/*.AppImage
            electron/dist-app/*.deb
            electron/dist-app/*.dmg
            electron/dist-app/*.exe
          if-no-files-found: warn
