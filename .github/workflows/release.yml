name: Release

# A pushed v* tag gets a GitHub Release created from its annotation — but a
# release that already exists (e.g. published from the UI, which is also what
# creates the tag) is left strictly alone. Overwriting almost erased the
# hand-written v0.1.0 notes once; never again.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the real tag object, not a shallow peel
      - name: Create release only if the tag has none
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release for $GITHUB_REF_NAME already exists — leaving it untouched"
            exit 0
          fi
          # checkout leaves the tag as a lightweight ref pointing at the commit,
          # so %(contents) yields the commit message and the annotation — the
          # actual release notes — is lost. Re-fetch to get the tag object.
          git fetch --force --tags origin "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME"
          git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes-file /tmp/notes.md
