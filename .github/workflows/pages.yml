name: Deploy landing + demo to GitHub Pages

# Publishes the static landing page (landing/) at the site root and the
# web UI built in demo mode (VITE_DEMO=1 → fabricated data, no server)
# under /demo/, on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      - name: Build demo (VITE_DEMO=1, base /agentglass/demo/)
        run: cd web && bun run build:demo
      - name: Assemble site (landing at /, demo at /demo/)
        run: |
          mkdir -p site/demo
          cp -r landing/. site/
          cp -r web/dist/. site/demo/
          touch site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
