name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Typecheck web
        run: cd web && bunx tsc --noEmit
      - name: Typecheck server
        run: cd server && bunx tsc --noEmit
      - name: Tests (server)
        run: cd server && bun test
      # web/test/ was never run by CI, so the dashboard's own tests — diff
      # themes, the session-live rule, the file tree — could break on a PR and
      # nothing would say so.
      - name: Tests (web)
        run: cd web && bun test
      - name: Build web
        run: cd web && bunx vite build
      # Pinned rather than the runner's preinstalled Chrome: the ubuntu-latest
      # image has dropped and re-added browsers before, and this also keeps the
      # step working on container or self-hosted runners that ship none.
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      # tsc, bun test and vite build all pass on a bundle that throws the
      # instant a browser evaluates it — a use-before-declaration inside a
      # component already shipped a black screen that way. This is the only
      # step that actually runs the thing.
      - name: Smoke (production bundle boots)
        run: bun scripts/smoke.ts
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
      - name: Server boots
        run: |
          cd server
          AGENTGLASS_PORT=4123 AGENTGLASS_DB=/tmp/ci.db AGENTGLASS_SCAN_DISABLED=1 bun run src/index.ts &
          SVPID=$!
          sleep 2
          curl -sf http://localhost:4123/health
          kill $SVPID
